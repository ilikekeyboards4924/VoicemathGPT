<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Chat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">

    <style>
        body {
            background-color: rgba(241, 239, 231);
            margin: 0;
        }

        * {
            font-family: 'Tinos', 'Times New Roman', Times, serif;
            font-weight: 700;
            box-sizing: border-box;

            /* outline: 1px solid red !important; */
        }

        .user-interface-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; 

            min-height: 100vh; 
            padding: 10vh 0 0 0;
        }

        @media (min-height: 800px) and (min-width: 1024px) {
            .user-interface-container {
                padding: 20vh 0 0 0;
            }
        }

        .logo-png {
            display: block;
            align-self: flex-start;
            
            width: 20vh;
            height: auto;

            margin-left: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    
    <div class="user-interface-container">
        <button id="recordButton">Start Recording</button>
        <div id="test"></div>

        <img src="../assets/logo.png" class="logo-png">
    </div>

    <script>
        const recordBtn = document.getElementById('recordButton');
        const displayDiv = document.getElementById('test');

        let mediaRecorder;
        let audioChunks = [];
        let recognition;

        // 1. Setup Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            console.log("YAAAOOOIIIIII!!!!!");

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                displayDiv.innerText = transcript; // Update the "Work in progress" text live
            };
        }

        // 2. Button Click Handler
        recordBtn.addEventListener('click', async () => {
            // Toggle STOP
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                if (recognition) recognition.stop();
                recordBtn.innerText = "Start Recording";
                return;
            }

            // Toggle START
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Setup MediaRecorder for server-side audio
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await sendAudioToServer(audioBlob);
                };

                mediaRecorder.start();
                if (recognition) {
                    displayDiv.innerText = "Listening...";
                    recognition.start();
                }
                
                recordBtn.innerText = "Stop Recording";
            } catch (err) {
                console.error("Mic access denied or error:", err);
                displayDiv.innerText = "Mic access denied.";
            }
        });

        async function sendAudioToServer(blob) {
            const formData = new FormData();
            formData.append('audio', blob, 'recording.webm');
            
            // Replace with your RunPod or server URL
            try {
                await fetch('YOUR_SERVER_URL', { method: 'POST', body: formData });
            } catch (e) {
                console.error("Upload failed", e);
            }
        }
    </script>
</body>
</html>
