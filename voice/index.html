<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Chat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">

    <style>
        body {
            background-color: rgba(241, 239, 231);
            margin: 0;
        }

        * {
            font-family: 'Tinos', 'Times New Roman', Times, serif;
            font-weight: 700;
            box-sizing: border-box;

            /* outline: 1px solid red !important; */
        }

        .user-interface-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; 

            min-height: 100vh; 
            padding: 10vh 0 0 0;
        }

        @media (min-height: 800px) and (min-width: 1024px) {
            .user-interface-container {
                padding: 20vh 0 0 0;
            }
        }

        .content-group {
            display: flex;
            flex-direction: column;
            align-items: center;

            width: 100%;
        }

        .greeting-div {
            width: 100%;
            max-width: 100vw;
            padding: 0 5vw;

            font-size: clamp(40px, 6.5vh, 100px);
            font-style: italic;
            color: rgba(22, 18, 211);
            text-align: center;
            
            margin-bottom: 7.5vh;
        }

        @media (min-height: 800px) and (min-width: 1024px) {
            .greeting-div {
                font-size: clamp(65px, 10vh, 200px);
            }
        }

        .submit-button {
            background-color: rgba(22, 18, 211);

            width: auto;

            font-size: clamp(25px, 5vh, 35px);
            color: white;
            font-style: italic;
            text-decoration: none;
            text-align: center;
            
            padding: 10px 40px;
            
            display: inline-block;
            border-radius: 8px;
            margin-bottom: 4vh;
            
            background: linear-gradient(90deg, #3e76f0, #1612d3, #3e76f0);
            background-size: 200% 100%;
            animation: gradient-slide 4.5s infinite linear;
        }

        @keyframes gradient-slide {
            from { background-position: 0% 0%; }
            to { background-position: 200% 0%; }
        }

        .logo-png {
            display: block;
            align-self: flex-start;
            
            width: 20vh;
            height: auto;

            margin-left: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    
    <div class="user-interface-container">
        <div></div>

        <img src="../assets/logo.png" class="logo-png">
    </div>
</body>
</html>
