<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Chat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">

    <style>
        body {
            background-color: rgba(241, 239, 231);
            margin: 0;
        }

        * {
            font-family: 'Tinos', 'Times New Roman', Times, serif;
            font-weight: 700;
            box-sizing: border-box;

            /* outline: 1px solid red !important; */
        }

        .user-interface-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; 

            min-height: 100dvh; 
            padding: 10dvh 0 0 0;
        }

        @media (min-height: 800px) and (min-width: 1024px) {
            .user-interface-container {
                padding: 20dvh 0 0 0;
            }
        }

        .logo-png {
            display: block;
            align-self: flex-start;
            
            width: 20dvh;
            height: auto;

            margin-left: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    
    <div class="user-interface-container">
        <textarea id="chatMessage" placeholder="textarea until I get real-time voice transcription working" style="width: 500px; height: 50px;"></textarea>
        <button id="sendButton" onclick="onSend()">Send Message</button>
        <div id="test"></div>

        <img src="../assets/logo.png" class="logo-png">
    </div>

    <script>
        async function onSend() {
            const response = await fetch('https://voicemathgpt.ilikekeyboards4924.workers.dev/');

            const data = await response.json();

            console.log(data);
        }
    </script>
</body>
</html>
