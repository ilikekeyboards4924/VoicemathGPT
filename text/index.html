<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">

    <style>
        body {
            background-color: rgba(241, 239, 231);
            margin: 0;
        }

        * {
            font-family: 'Tinos', 'Times New Roman', Times, serif;
            font-weight: 700;
            box-sizing: border-box;

            /* outline: 1px solid red !important; */
        }

        .user-interface-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 

            min-height: 100vh;

            padding: 0;

            position: relative;
        }

        .work-in-progress {
            width: 100%;
            max-width: 100vw;
            padding: 0 5vw;

            font-size: clamp(40px, 6.5vh, 100px);
            font-style: italic;
            color: rgba(22, 18, 211);
            text-align: center;
            
            margin-bottom: 7.5vh;
            margin-top: -5vh;
        }

        @media (min-height: 800px) and (min-width: 1024px) {
            .work-in-progress {
                font-size: clamp(65px, 20vh, 200px);
            }
        }

        .logo-png {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 20vh;
            height: auto;
        }
    </style>
</head>
<body>
    
    <div class="user-interface-container">
        <div class="work-in-progress">Work in progress...</div>

        <img src="../assets/logo.png" class="logo-png">
    </div>
</body>
</html>
