<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoicemathGPT</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <style>
        body {
            background-color: rgba(241, 239, 231);
            margin: 0;
        }

        * {
            font-family: 'Tinos', 'Times New Roman', Times, serif;
            font-weight: 700;
            box-sizing: border-box;

            /* outline: 1px solid red !important; */
        }

        .user-interface-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; 

            min-height: 100dvh; 
            padding: 5vh 0 0 0;
        }
        @media (min-height: 800px) and (min-width: 1024px) {
            .user-interface-container {
                padding: 20vh 0 0 0;
            }
        }

        .content-group {
            display: flex;
            flex-direction: column;
            align-items: center;

            width: 100%;
        }

        .greeting-div {
            width: 100%;
            max-width: 100vw;
            padding: 0 5vw;

            font-size: clamp(40px, 6.5vh, 100px);
            font-style: italic;
            color: rgba(22, 18, 211);
            text-align: center;
            
            margin-bottom: 4.5vh;
        }
        @media (min-height: 800px) and (min-width: 1024px) {
            .greeting-div {
                font-size: clamp(65px, 10vh, 200px);

                margin-bottom: 7.5vh;
            }
        }

        .homepage-button {
            background-color: rgb(86, 110, 218);

            width: auto;

            font-size: clamp(25px, 5vh, 35px);
            color: white;
            font-style: italic;
            text-decoration: none;
            text-align: center;
            
            padding: 10px 40px;
            
            display: inline-block;
            border-radius: 8px;
            margin-bottom: 4vh;
        }

        .logo-png {
            display: block;
            align-self: flex-start;
            
            width: 20vh;
            height: auto;

            margin-left: 20px;
            margin-bottom: 80px;
        }
        @media (min-height: 800px) and (min-width: 1024px) {
            .logo-png {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="user-interface-container">
        <div class="content-group">
            <div class="greeting-div">Choose the conversation medium.</div>
            <a href="./voice/" class="homepage-button">Voice chat</a>
            <a href="./text/" class="homepage-button">Text-based chat</a>
        </div>

        <img src="./assets/logo.png" class="logo-png">
    </div>
    <script>
        function openFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }
    </script>
</body>
</html>
