<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoicemathGPT</title>

    <meta property="og:title" content="voicemath gpt">
    <meta property="og:description" content="a website for generating voices.">
    <meta property="og:url" content="https://www.voicemath.cc">

    <meta property="og:image" content="https://www.voicemath.cc/assets/logo.png">
    <meta property="og:image:width" content="400">
    <meta property="og:image:height" content="400">

    <meta content="#f1efe7" property="og:color" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <style>
        body {
            background-color: rgba(241, 239, 231);
            margin: 0;
        }

        * {
            font-family: 'Tinos', 'Times New Roman', Times, serif;
            font-weight: 700;
            box-sizing: border-box;

            /* outline: 1px solid red !important; */
        }

        .user-interface-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;

            min-height: 100dvh; 
            padding: 10dvh 0 0 0;
        }
        @media (min-height: 800px) and (min-width: 1024px) {
            .user-interface-container {
                padding: 20dvh 0 0 0;
            }
        }

        .content-group {
            display: flex;
            flex-direction: column;
            align-items: center;

            width: 100%;
        }

        .greeting-div {
            width: 100%;
            max-width: 100dvw;
            padding: 0 5dvw;

            font-size: clamp(40px, 6.5dvh, 100px);
            font-style: italic;
            color: rgba(22, 18, 211);
            text-align: center;
            
            margin-bottom: 7.5dvh;
        }
        @media (min-height: 800px) and (min-width: 1024px) {
            .greeting-div {
                font-size: clamp(65px, 10dvh, 200px);
            }
        }

        .homepage-button {
            background-color: rgb(0, 27, 150);

            width: auto;

            font-size: clamp(25px, 5dvh, 35px);
            color: white;
            font-style: italic;
            text-decoration: none;
            text-align: center;
            
            padding: 10px 40px;
            
            display: inline-block;
            border-radius: 8px;
            margin-bottom: 4dvh;
        }

        .logo-link {
            align-self: flex-start;
            display: block;

            line-height: 0;
            text-decoration: none;
        
            margin-left: 20px;
            margin-bottom: 20px;
        }

        .logo-png {
            display: block;
            align-self: flex-start;
            
            width: 20dvh;
            height: auto;
        }
    </style>
</head>
<body>
    
    <div class="user-interface-container">
        <div class="content-group">
            <div class="greeting-div">Choose the conversation medium.</div>
            <a href="./voice/" class="homepage-button">Voice chat</a>
            <a href="./text/" class="homepage-button">Text-based chat</a>
        </div>

        <a href="./" class="logo-link">
            <img src="./assets/logo.png" class="logo-png">
        </a>
    </div>
</body>
</html>
