<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoicemathGPT</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <style>
        :root {
            --ui-width: clamp(65px, 40vw, 800px);
        }

        body {
            background-color: rgba(241, 239, 231);
            margin: 0;
        }

        * {
            font-family: 'Tinos', 'Times New Roman', Times, serif;
            font-weight: 700;

            outline: 1px solid red !important;
        }

        .logo-png {
            display: block;
            z-index: 999;

            width: 20vh;
            height: auto;

            align-self: flex-start;

            margin-top: auto;
            margin-left: 20px;
            margin-bottom: 20px;
        }

        .user-interface-container {
            display: flex;
            flex-direction: column;
            
            align-items: center;
            justify-content: space-between;

            min-height: 80vh;
            z-index: 1;

            padding: 5vh 0 0 0;
        }
        @media (min-height: 800px) and (min-width: 1024px) {
            .user-interface-container {
                padding: 20vh 0 0 0;
            }
        }

        .greeting-div {
            width: 100%;
            max-width: 100vw;
            box-sizing: border-box;  
            padding: 0 5vw;
            
            display: block;
            word-wrap: break-word;
            overflow-wrap: break-word;

            font-size: clamp(40px, 6.5vh, 100px);
            font-style: italic;
            color: rgba(22, 18, 211);

            text-align: center;

            margin-top: 0vh;
            margin-bottom: 7.5vh;
        }
        @media (min-height: 800px) and (min-width: 1024px) {
            .greeting-div {
                font-size: clamp(65px, 10vh, 200px);
            }
        }

        .submit-button {
            width: auto;
            height: auto;
            box-sizing: border-box;

            background-color: rgba(22, 18, 211);

            font-size: clamp(25px, 5vh, 35px);
            color: white;
            font-style: italic;
            padding: 10px 20px;

            text-decoration: none;
            color: white;
            display: inline-block;


            border-radius: 8px;

            margin-bottom: 4vh;

            outline: none;
            border: none;
            appearance: none;

            background: linear-gradient(90deg, #3e76f0, #1612d3, #3e76f0);
            background-size: 200% 100%;
            background-position: 0% 0%;
            transition: background-position 0.1s;

            animation: gradient-slide 4.5s infinite linear;
        }

        @keyframes gradient-slide {
            from { background-position: 0% 0%; }
            to { background-position: 200% 0%; }
        }
    </style>
    <script>

    </script>
</head>
<body>
    
    <div class="user-interface-container">
        <div class="greeting-div">Choose the conversation medium.</div>
        
        <!-- <a href="./text/">
            <button class="submit-button" onclick="">Text-based chat</button>
        </a>
        <a href="./voice/">
            <button class="submit-button" onclick="">Voice chat</button>
        </a> -->

        <a href="./text/" class="submit-button">Text-based chat</a>
        <a href="./voice/" class="submit-button">Voice chat</a>

        <img src="./assets/logo.png" class="logo-png">
    </div>
</body>
</html>
